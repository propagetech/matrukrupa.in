<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-label="A workshop bench where fixtures are crafted from wood and metal">
  <defs>
    <style>
      .slate{fill:#2a323b}.gold{fill:#cda23f}.goldL{fill:#dcbb6b}.mag{fill:#a8328f}.cream{fill:#f6f1e7}.cream2{fill:#e9e1cf}.line{fill:none;stroke:#2a323b;stroke-width:3}
    </style>
  </defs>
  <!-- back wall pegboard -->
  <rect x="60" y="48" width="360" height="150" rx="8" class="cream2"/>
  <g fill="#2a323b" opacity="0.18">
    <circle cx="92" cy="80" r="3"/><circle cx="124" cy="80" r="3"/><circle cx="156" cy="80" r="3"/><circle cx="188" cy="80" r="3"/>
    <circle cx="92" cy="112" r="3"/><circle cx="124" cy="112" r="3"/><circle cx="156" cy="112" r="3"/><circle cx="188" cy="112" r="3"/>
  </g>
  <!-- hanging tools -->
  <rect x="250" y="70" width="14" height="58" rx="4" class="slate"/>
  <rect x="278" y="70" width="14" height="74" rx="4" class="gold"/>
  <path d="M312 70 l22 0 l0 14 l-12 0 l0 40 l-10 0 Z" class="slate"/>
  <rect x="348" y="70" width="40" height="14" rx="4" class="mag"/>
  <!-- workbench -->
  <rect x="48" y="232" width="384" height="20" class="slate"/>
  <rect x="70" y="252" width="16" height="78" class="slate"/>
  <rect x="394" y="252" width="16" height="78" class="slate"/>
  <!-- wood plank being worked -->
  <rect x="96" y="208" width="200" height="24" rx="3" class="goldL"/>
  <rect x="96" y="208" width="200" height="24" rx="3" class="line"/>
  <line x1="140" y1="208" x2="140" y2="232" stroke="#cda23f" stroke-width="2"/>
  <line x1="196" y1="208" x2="196" y2="232" stroke="#cda23f" stroke-width="2"/>
  <line x1="248" y1="208" x2="248" y2="232" stroke="#cda23f" stroke-width="2"/>
  <!-- hand plane -->
  <rect x="300" y="196" width="70" height="20" rx="5" class="mag"/>
  <rect x="318" y="180" width="16" height="20" rx="4" class="slate"/>
  <!-- measuring square -->
  <path d="M120 300 h120 v14 h-106 v92" fill="none" stroke="#cda23f" stroke-width="8" stroke-linejoin="round" opacity="0"/>
  <!-- floor -->
  <rect x="0" y="330" width="480" height="6" class="gold"/>
</svg>
