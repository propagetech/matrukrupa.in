<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-label="Coordinated rollout and installation across many store locations in India">
  <defs>
    <style>
      .slate{fill:#2a323b}.gold{fill:#cda23f}.goldL{fill:#dcbb6b}.mag{fill:#a8328f}.cream{fill:#f6f1e7}.cream2{fill:#e9e1cf}
    </style>
  </defs>
  <!-- central hub -->
  <circle cx="240" cy="186" r="44" class="slate"/>
  <circle cx="240" cy="186" r="22" class="mag"/>
  <circle cx="240" cy="186" r="22" fill="none" stroke="#f6f1e7" stroke-width="4"/>
  <!-- connection lines -->
  <g stroke="#cda23f" stroke-width="3" stroke-dasharray="2 7" stroke-linecap="round">
    <line x1="240" y1="186" x2="96" y2="92"/>
    <line x1="240" y1="186" x2="384" y2="92"/>
    <line x1="240" y1="186" x2="84" y2="262"/>
    <line x1="240" y1="186" x2="396" y2="262"/>
    <line x1="240" y1="186" x2="240" y2="300"/>
  </g>
  <!-- location pins (store nodes) -->
  <g>
    <g transform="translate(96 92)"><path d="M0 -22 a16 16 0 1 1 0 0.01 M-16 -6 L0 18 L16 -6 Z" class="gold"/><circle cy="-7" r="7" class="cream"/></g>
    <g transform="translate(384 92)"><path d="M0 -22 a16 16 0 1 1 0 0.01 M-16 -6 L0 18 L16 -6 Z" class="gold"/><circle cy="-7" r="7" class="cream"/></g>
    <g transform="translate(84 262)"><path d="M0 -22 a16 16 0 1 1 0 0.01 M-16 -6 L0 18 L16 -6 Z" class="gold"/><circle cy="-7" r="7" class="cream"/></g>
    <g transform="translate(396 262)"><path d="M0 -22 a16 16 0 1 1 0 0.01 M-16 -6 L0 18 L16 -6 Z" class="gold"/><circle cy="-7" r="7" class="cream"/></g>
    <g transform="translate(240 300)"><path d="M0 -22 a16 16 0 1 1 0 0.01 M-16 -6 L0 18 L16 -6 Z" class="mag"/><circle cy="-7" r="7" class="cream"/></g>
  </g>
</svg>
